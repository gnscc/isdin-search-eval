const categories = {"A": "Sinónimo semántico", "B": "Problema / skin concern", "C": "Ingrediente", "D": "Marca / sublínea", "E": "Atributo (SPF, formato, tamaño)", "F": "Broad / intención vaga", "G": "Multilingüe", "H": "Prefijo / autocompletado", "I": "Typo / error ortográfico", "J": "Zero-result (irrelevante)", "K": "Parte del cuerpo", "L": "Caso de uso / ocasión", "M": "Multi-intent (combinada)", "N": "Nombre completo de producto", "O": "Conversacional / natural", "P": "Refill vs producto completo", "Q": "Visual / multimodal"};

function getItem(pid) {
  if (products[pid]) return { ...products[pid], _type: 'product' };
  if (events[pid]) return { ...events[pid], _type: 'event' };
  return { id: pid, _type: 'unknown' };
}

// Build sidebar
const catFilter = document.getElementById('cat-filter');
Object.entries(categories).forEach(([k, v]) => {
  const opt = document.createElement('option');
  opt.value = k;
  opt.textContent = k + ' — ' + v;
  catFilter.appendChild(opt);
});

function renderQueryList(filter) {
  const list = document.getElementById('query-list');
  list.innerHTML = '';
  let currentCat = '';

  judgments.forEach(j => {
    const q = queries[j.query_id];
    if (!q) return;
    if (filter && q.category !== filter) return;

    if (q.category !== currentCat) {
      currentCat = q.category;
      const label = document.createElement('div');
      label.className = 'category-label';
      label.textContent = currentCat + ' — ' + (categories[currentCat] || '');
      list.appendChild(label);
    }

    const item = document.createElement('div');
    item.className = 'query-item';
    item.dataset.qid = j.query_id;
    const count = Object.keys(j.judgments || {}).length;
    item.innerHTML = '<span class="qid">' + j.query_id + '</span>' + q.query + '<span class="count">' + count + '</span>';
    item.onclick = () => showQuery(j.query_id);
    list.appendChild(item);
  });
}

function filterCategory(cat) {
  renderQueryList(cat);
}

function showQuery(qid) {
  document.querySelectorAll('.query-item').forEach(el => el.classList.remove('active'));
  const active = document.querySelector('[data-qid="' + qid + '"]');
  if (active) active.classList.add('active');

  const j = judgments.find(x => x.query_id === qid);
  const q = queries[qid];
  if (!j || !q) return;

  const scores = j.judgments || {};
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

  const n3 = sorted.filter(([,s]) => s === 3).length;
  const n2 = sorted.filter(([,s]) => s === 2).length;
  const n1 = sorted.filter(([,s]) => s === 1).length;

  let html = '<div class="detail-header">';
  html += '<h2>"' + q.query + '"</h2>';
  html += '<div class="stats">';
  html += '<div class="stat"><div class="stat-value">' + sorted.length + '</div><div class="stat-label">relevant</div></div>';
  html += '<div class="stat"><div class="stat-value score-3">' + n3 + '</div><div class="stat-label">score 3</div></div>';
  html += '<div class="stat"><div class="stat-value score-2">' + n2 + '</div><div class="stat-label">score 2</div></div>';
  html += '<div class="stat"><div class="stat-value score-1">' + n1 + '</div><div class="stat-label">score 1</div></div>';
  html += '</div>';
  if (j.expected_top_3 && j.expected_top_3.length) {
    const top3names = j.expected_top_3.map(pid => {
      const p = products[pid];
      return p ? p.name : pid;
    });
    html += '<div class="top3"><strong>Expected top 3:</strong> ' + top3names.join(' → ') + '</div>';
  }
  if (j.notes) {
    html += '<div class="notes"><strong>Notes:</strong> ' + j.notes + '</div>';
  }
  html += '</div>';

  html += '<table class="products-table"><thead><tr>';
  html += '<th>Score</th><th>Type</th><th>ID</th><th>Brand/Type</th><th>Name/Title</th><th>Key Info</th>';
  html += '</tr></thead><tbody>';

  sorted.forEach(([pid, score]) => {
    const item = getItem(pid);
    let info = '';
    let typeLabel = '';

    if (item._type === 'product') {
      typeLabel = '<span class="tag" style="background:#dbeafe;color:#1e40af">product</span>';
      if (item.skinConcerns) info += '<div class="tag">' + item.skinConcerns.substring(0, 40) + '</div>';
      if (item.mainIngredients) info += '<div class="tag">' + item.mainIngredients.substring(0, 50) + '</div>';
      if (item.spf) info += '<div class="tag">' + item.spf + '</div>';
      if (item.size) info += '<div class="tag">' + item.size + '</div>';
    } else if (item._type === 'event') {
      typeLabel = '<span class="tag" style="background:#fef3c7;color:#92400e">event</span>';
      if (item.event_type) info += '<div class="tag">' + item.event_type + '</div>';
      if (item.description) info += '<div class="tag" style="max-width:300px;white-space:normal">' + item.description.substring(0, 100) + '</div>';
      if (item.location) info += '<div class="tag">' + item.location.substring(0, 50) + '</div>';
    } else {
      typeLabel = '<span class="tag" style="background:#fecaca;color:#991b1b">?</span>';
    }

    html += '<tr>';
    html += '<td><span class="score-badge score-' + score + '">' + score + '</span></td>';
    html += '<td>' + typeLabel + '</td>';
    html += '<td style="font-size:11px">' + pid.substring(0, 12) + '</td>';
    html += '<td>' + (item.brand || item.event_type || '') + '</td>';
    html += '<td>' + (item.name || item.title || '?') + '</td>';
    html += '<td>' + info + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('main-content').innerHTML = html;
}

renderQueryList('');
</script>
