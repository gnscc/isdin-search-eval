<script>
function getPlotDiv() {
  return document.querySelectorAll('.plotly-graph-div')[0];
}

function toggleAll(visible) {
  var gd = getPlotDiv();
  var update = {};
  var indices = [];
  for (var i = 0; i < gd.data.length; i++) {
    indices.push(i);
  }
  Plotly.restyle(gd, {'visible': visible ? true : 'legendonly'}, indices);
}

function searchProducts() {
  var query = document.getElementById('search').value.toLowerCase().trim();
  var gd = getPlotDiv();
  var info = document.getElementById('search-info');

  if (!query) {
    // Reset opacity
    var updates = [];
    for (var i = 0; i < gd.data.length; i++) {
      updates.push(i);
    }
    Plotly.restyle(gd, {'marker.opacity': 0.7, 'marker.size': 8}, updates);
    info.textContent = '';
    return;
  }

  var totalMatches = 0;
  for (var i = 0; i < gd.data.length; i++) {
    var trace = gd.data[i];
    var hoverNames = trace.hovertext || trace.text || [];
    var opacities = [];
    var sizes = [];
    for (var j = 0; j < hoverNames.length; j++) {
      var name = (hoverNames[j] || '').toLowerCase();
      if (name.includes(query)) {
        opacities.push(1.0);
        sizes.push(14);
        totalMatches++;
      } else {
        opacities.push(0.1);
        sizes.push(6);
      }
    }
    Plotly.restyle(gd, {'marker.opacity': [opacities], 'marker.size': [sizes]}, [i]);
  }
  info.textContent = totalMatches + ' match' + (totalMatches !== 1 ? 'es' : '');
}

function resetSearch() {
  document.getElementById('search').value = '';
  searchProducts();
}
</script>
